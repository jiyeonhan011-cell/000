<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="배드민턴 편성" />
  <title>배드민턴 게임 편성</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --male-color: #1976d2;
      --female-color: #e91e8c;
      --mixed-color: #7b1fa2;
      --bg: #f0f4f8;
      --card: #ffffff;
      --border: #dde3ec;
      --text: #1a202c;
      --text-muted: #64748b;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
      --nav-height: 64px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, '맑은 고딕', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-text-size-adjust: 100%;
    }

    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
      color: #fff;
      padding: 20px 24px;
      padding-top: max(20px, calc(20px + var(--safe-top)));
      box-shadow: var(--shadow-lg);
      position: sticky; top: 0; z-index: 50;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { font-size: 0.85rem; opacity: 0.85; margin-top: 2px; }
    .stats-bar { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
    .stat-chip {
      background: rgba(255,255,255,0.18); border-radius: 20px;
      padding: 4px 12px; font-size: 0.8rem; font-weight: 600;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    .grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; align-items: start; }

    .card {
      background: var(--card); border-radius: var(--radius);
      box-shadow: var(--shadow); overflow: hidden;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 1rem;
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 20px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group label {
      font-size: 0.78rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input {
      border: 1.5px solid var(--border); border-radius: 8px;
      padding: 9px 12px; font-size: 0.95rem; outline: none;
      transition: border-color 0.15s; background: #fafbfc;
    }
    .form-group input:focus { border-color: var(--primary); background: #fff; }

    .gender-buttons { display: flex; gap: 6px; }
    .gender-btn {
      flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600; background: #fafbfc;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .gender-btn.male.active   { border-color: var(--male-color);   background: #e3f2fd; color: var(--male-color); }
    .gender-btn.female.active { border-color: var(--female-color); background: #fce4ec; color: var(--female-color); }

    .level-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .level-btn {
      padding: 8px 4px; border: 2px solid var(--border); border-radius: 8px;
      cursor: pointer; font-size: 0.95rem; font-weight: 700; background: #fafbfc;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
      text-align: center;
    }

    /* Court settings */
    .court-buttons { display: flex; gap: 6px; }
    .court-btn {
      flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: 8px;
      cursor: pointer; font-size: 0.95rem; font-weight: 700; background: #fafbfc;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
    }
    .court-btn.active { border-color: var(--primary); background: #eff6ff; color: var(--primary); }
    .lesson-toggle {
      width: 100%; padding: 9px 12px; border: 2px solid var(--border); border-radius: 8px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600; background: #fafbfc;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent; min-height: 42px;
    }
    .lesson-toggle.on { border-color: #a855f7; background: #f3e8ff; color: #a855f7; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: 8px; border: none;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: all 0.15s; -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn-primary {
      background: var(--primary); color: #fff; width: 100%;
      margin-top: 8px; padding: 12px; min-height: 48px;
    }
    .btn-primary:active { background: var(--primary-dark); }
    .btn-generate {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff; width: 100%; padding: 13px; font-size: 1rem;
      border-radius: 10px; border: none; min-height: 52px;
      box-shadow: 0 4px 12px rgba(34,197,94,0.3);
    }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; }
    .btn-danger {
      background: #fff; color: #ef4444;
      border: 1.5px solid #fca5a5; font-size: 0.8rem;
      padding: 6px 12px; border-radius: 6px; min-height: 36px;
    }
    .btn-danger:active { background: #fee2e2; }
    .btn-secondary {
      background: #f1f5f9; color: var(--text);
      border: 1.5px solid var(--border); min-height: 42px;
    }
    .btn-secondary:active { background: #e2e8f0; }

    .data-bar { display: flex; gap: 8px; padding: 0 12px 10px; }
    .data-bar .btn { flex: 1; font-size: 0.82rem; min-height: 40px; }

    .player-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 300px; overflow-y: auto;
    }
    .player-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 8px;
      border: 1.5px solid var(--border); background: #fafbfc;
    }
    .player-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }
    .avatar-male   { background: #dbeafe; color: var(--male-color); }
    .avatar-female { background: #fce7f3; color: var(--female-color); }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 600; font-size: 0.9rem; }
    .player-meta { font-size: 0.75rem; color: var(--text-muted); }
    .level-badge {
      width: 26px; height: 26px; border-radius: 6px;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
    }

    .empty-list {
      text-align: center; padding: 30px 20px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .empty-list .icon { font-size: 2rem; margin-bottom: 8px; }

    .tabs {
      display: flex; gap: 4px; padding: 0 20px;
      border-bottom: 1px solid var(--border); background: #f8fafc;
      overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab-btn {
      padding: 12px 16px; border: none; background: none;
      font-size: 0.875rem; font-weight: 600; color: var(--text-muted);
      cursor: pointer; position: relative; border-radius: 8px 8px 0 0;
      transition: color 0.15s; white-space: nowrap;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .tab-btn.active { color: var(--primary); }
    .tab-btn.active::after {
      content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
      height: 2px; background: var(--primary); border-radius: 2px 2px 0 0;
    }
    .tab-btn .count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; border-radius: 9px;
      font-size: 0.7rem; margin-left: 5px; padding: 0 5px;
      background: #e2e8f0; color: var(--text-muted);
    }
    .tab-btn.active .count { background: #dbeafe; color: var(--primary); }

    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }

    .matches-grid { display: flex; flex-direction: column; gap: 10px; }
    .match-card {
      border-radius: 10px; border: 1.5px solid var(--border);
      overflow: hidden;
    }
    .match-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; font-size: 0.75rem; font-weight: 600;
    }
    .match-header-men   { background: #eff6ff; color: var(--male-color); }
    .match-header-women { background: #fdf2f8; color: var(--female-color); }
    .match-header-mixed { background: #faf5ff; color: var(--mixed-color); }

    .court-chip {
      display: inline-flex; align-items: center;
      padding: 1px 6px; border-radius: 4px; font-size: 0.68rem; font-weight: 700;
      background: var(--primary); color: white; vertical-align: middle; margin-left: 4px;
    }

    .match-body {
      display: flex; align-items: center; padding: 12px 14px; gap: 10px;
    }
    .team { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .team.right { align-items: flex-end; }
    .player-tag {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.88rem; font-weight: 600;
    }
    .team.right .player-tag { flex-direction: row-reverse; }
    .player-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-male   { background: var(--male-color); }
    .dot-female { background: var(--female-color); }

    .vs-badge {
      flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
      background: var(--bg); border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: var(--text-muted);
    }

    .round-header {
      display: flex; align-items: center; gap: 8px; margin: 16px 0 8px;
    }
    .round-badge {
      background: var(--primary); color: #fff;
      font-size: 0.75rem; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
    }
    .round-line { flex: 1; height: 1px; background: var(--border); }

    .no-matches {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted); font-size: 0.9rem;
    }
    .no-matches .big-icon { font-size: 3rem; margin-bottom: 8px; }

    .action-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

    .alert { padding: 10px 14px; border-radius: 8px; font-size: 0.85rem; margin-bottom: 12px; }
    .alert-warning { background: #fff7ed; border: 1.5px solid #fed7aa; color: #c2410c; }

    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .summary-box { border-radius: 10px; padding: 12px; text-align: center; }
    .summary-box-men   { background: #eff6ff; border: 1.5px solid #bfdbfe; }
    .summary-box-women { background: #fdf2f8; border: 1.5px solid #fbcfe8; }
    .summary-box-mixed { background: #faf5ff; border: 1.5px solid #e9d5ff; }
    .summary-num { font-size: 1.6rem; font-weight: 800; line-height: 1; }
    .summary-label { font-size: 0.72rem; font-weight: 600; margin-top: 2px; color: var(--text-muted); }
    .summary-num-men   { color: var(--male-color); }
    .summary-num-women { color: var(--female-color); }
    .summary-num-mixed { color: var(--mixed-color); }

    .scrollable { max-height: 600px; overflow-y: auto; }

    .shake { animation: shake 0.3s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

    .mobile-nav {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid var(--border);
      padding-bottom: var(--safe-bottom);
      z-index: 200;
      box-shadow: 0 -2px 16px rgba(0,0,0,0.1);
    }
    .mobile-nav-inner { display: flex; }
    .mobile-nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; padding: 10px 4px;
      border: none; background: none;
      color: var(--text-muted); cursor: pointer;
      position: relative; min-height: var(--nav-height);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .mobile-nav-btn.active { color: var(--primary); }
    .mobile-nav-btn.active .nav-icon-wrap { background: #eff6ff; border-radius: 12px; }
    .nav-icon-wrap {
      width: 44px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 14px; transition: background 0.15s;
    }
    .nav-icon { font-size: 1.25rem; line-height: 1; }
    .nav-label { font-size: 0.7rem; font-weight: 600; }
    .nav-badge {
      position: absolute; top: 8px; right: calc(50% - 28px);
      background: #ef4444; color: #fff;
      border-radius: 10px; min-width: 18px; height: 18px;
      font-size: 0.65rem; font-weight: 700; padding: 0 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .nav-badge:empty { display: none; }

    @media (max-width: 640px) {
      .mobile-nav { display: block; }

      header {
        padding: max(14px, calc(14px + var(--safe-top))) 16px 14px;
        position: sticky; top: 0;
      }
      header h1 { font-size: 1.25rem; }
      header p  { font-size: 0.8rem; }
      .stats-bar { margin-top: 8px; gap: 8px; }
      .stat-chip { font-size: 0.72rem; padding: 3px 10px; }

      .container {
        padding: 12px 10px;
        padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px);
      }
      .grid { grid-template-columns: 1fr; gap: 12px; }

      .mobile-section { display: none; }
      .mobile-section.active { display: block; }

      .card-body { padding: 14px; }
      .card-header { padding: 14px 16px; }

      .form-group input { font-size: 16px; padding: 11px 14px; }
      .gender-btn { min-height: 48px; font-size: 1rem; padding: 12px; }
      .level-btn  { min-height: 44px; font-size: 1rem; padding: 10px 4px; }
      .btn-primary { min-height: 52px; font-size: 1rem; padding: 14px; margin-top: 10px; }
      .btn-generate { min-height: 56px; font-size: 1.05rem; padding: 14px; }

      .player-item { padding: 12px; }
      .player-avatar { width: 40px; height: 40px; font-size: 0.9rem; }
      .player-name { font-size: 0.95rem; }
      .btn-danger { min-height: 40px; min-width: 52px; padding: 8px 12px; font-size: 0.85rem; }
      .player-list { max-height: none; }

      .court-btn { min-height: 44px; }
      .lesson-toggle { min-height: 44px; }

      .tabs { padding: 0 6px; }
      .tab-btn { flex: 1; min-width: 68px; padding: 12px 6px; font-size: 0.82rem; }
      .tab-content { padding: 14px; }

      .scrollable { max-height: none; }

      .match-body { padding: 10px 12px; gap: 8px; }
      .player-tag { font-size: 0.83rem; gap: 5px; }
      .match-header { padding: 6px 12px; }

      .summary-num { font-size: 1.35rem; }
      .summary-box { padding: 10px; }

      .action-bar { flex-direction: row; }
      .action-bar .btn { flex: 1; justify-content: center; }

      .data-bar .btn { font-size: 0.78rem; }
    }

    @media (min-width: 641px) {
      .mobile-section { display: block !important; }
    }

    @media print {
      header .stats-bar, .card:first-child, .action-bar, .tabs, .mobile-nav { display: none !important; }
      .tab-content { display: block !important; }
      .card { box-shadow: none; border: 1px solid #e5e7eb; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏸 배드민턴 게임 편성</h1>
  <p>급수별 자동 게임 편성 시스템</p>
  <div class="stats-bar" id="headerStats">
    <span class="stat-chip">전체 0명</span>
    <span class="stat-chip">남 0명</span>
    <span class="stat-chip">여 0명</span>
  </div>
</header>

<div class="container">
  <div class="grid">

    <div class="mobile-section active" id="section-register">

      <!-- 선수 등록 -->
      <div class="card" style="margin-bottom: 12px;">
        <div class="card-header">👤 선수 등록</div>
        <div class="card-body">
          <div class="form-group" style="margin-bottom: 10px;">
            <label>이름</label>
            <input type="text" id="inputName" placeholder="이름 입력"
              maxlength="10" autocomplete="off" autocorrect="off" autocapitalize="words" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>성별</label>
              <div class="gender-buttons">
                <button class="gender-btn male active" data-gender="남" onclick="selectGender('남')">남</button>
                <button class="gender-btn female"      data-gender="여" onclick="selectGender('여')">여</button>
              </div>
            </div>
            <div class="form-group">
              <label>급수</label>
              <div class="level-buttons" id="levelButtons">
                <button class="level-btn" data-level="A" onclick="selectLevel('A')">A</button>
                <button class="level-btn" data-level="B" onclick="selectLevel('B')">B</button>
                <button class="level-btn" data-level="C" onclick="selectLevel('C')">C</button>
                <button class="level-btn" data-level="D" onclick="selectLevel('D')">D</button>
                <button class="level-btn" data-level="E" onclick="selectLevel('E')">E</button>
                <button class="level-btn" data-level="왕초심" onclick="selectLevel('왕초심')" style="font-size:0.72rem;">왕초심</button>
              </div>
            </div>
          </div>
          <button class="btn btn-primary" onclick="addPlayer()">+ 선수 추가</button>
        </div>
      </div>

      <!-- 코트 설정 -->
      <div class="card" style="margin-bottom: 12px;">
        <div class="card-header">⚙️ 코트 설정</div>
        <div class="card-body">
          <div class="form-row">
            <div class="form-group">
              <label>일반 코트 수</label>
              <div class="court-buttons" id="courtButtons">
                <button class="court-btn" data-count="1" onclick="selectCourtCount(1)">1</button>
                <button class="court-btn" data-count="2" onclick="selectCourtCount(2)">2</button>
                <button class="court-btn" data-count="3" onclick="selectCourtCount(3)">3</button>
                <button class="court-btn" data-count="4" onclick="selectCourtCount(4)">4</button>
                <button class="court-btn" data-count="5" onclick="selectCourtCount(5)">5</button>
              </div>
            </div>
            <div class="form-group">
              <label>레슨 코트</label>
              <button class="lesson-toggle" id="lessonToggle" onclick="toggleLessonCourt()">OFF</button>
            </div>
          </div>
          <p style="font-size:0.75rem;color:var(--text-muted);margin-top:6px;">
            레슨코트 ON 시 해당 코트는 경기 편성에서 제외됩니다
          </p>
        </div>
      </div>

      <!-- 참가 선수 목록 -->
      <div class="card">
        <div class="card-header" id="playerListHeader">
          📋 참가 선수 <span style="font-weight:400;color:var(--text-muted);font-size:.85rem;">(0명)</span>
        </div>
        <div class="card-body" style="padding: 12px;">
          <div class="player-list" id="playerList">
            <div class="empty-list">
              <div class="icon">🏸</div>
              선수를 등록해주세요
            </div>
          </div>
        </div>
        <div class="data-bar">
          <button class="btn btn-secondary" onclick="exportData()">💾 내보내기</button>
          <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">📂 불러오기</button>
          <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
        </div>
        <div style="padding: 0 12px 16px;">
          <button class="btn btn-generate" id="btnGenerate" onclick="generateMatches()" disabled>
            ⚡ 게임 편성 생성
          </button>
        </div>
      </div>
    </div>

    <!-- 경기 편성 -->
    <div class="mobile-section card" id="section-schedule">
      <div class="tabs">
        <button class="tab-btn active" data-tab="all"   onclick="switchTab('all')">전체 <span class="count" id="countAll">0</span></button>
        <button class="tab-btn"        data-tab="men"   onclick="switchTab('men')">남복 <span class="count" id="countMen">0</span></button>
        <button class="tab-btn"        data-tab="women" onclick="switchTab('women')">여복 <span class="count" id="countWomen">0</span></button>
        <button class="tab-btn"        data-tab="mixed" onclick="switchTab('mixed')">혼복 <span class="count" id="countMixed">0</span></button>
      </div>
      <div class="tab-content active" id="tab-all">
        <div class="no-matches"><div class="big-icon">📋</div>선수를 등록하고<br>게임 편성을 생성해주세요</div>
      </div>
      <div class="tab-content" id="tab-men">
        <div class="no-matches"><div class="big-icon">🔵</div>남복 경기가 없습니다</div>
      </div>
      <div class="tab-content" id="tab-women">
        <div class="no-matches"><div class="big-icon">🔴</div>여복 경기가 없습니다</div>
      </div>
      <div class="tab-content" id="tab-mixed">
        <div class="no-matches"><div class="big-icon">🟣</div>혼복 경기가 없습니다</div>
      </div>
    </div>

  </div>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-inner">
    <button class="mobile-nav-btn active" id="navRegister" onclick="switchMobileView('register')">
      <div class="nav-icon-wrap"><span class="nav-icon">👤</span></div>
      <span class="nav-label">선수 등록</span>
      <span class="nav-badge" id="navBadgeCount"></span>
    </button>
    <button class="mobile-nav-btn" id="navSchedule" onclick="switchMobileView('schedule')">
      <div class="nav-icon-wrap"><span class="nav-icon">🏸</span></div>
      <span class="nav-label">경기 편성</span>
      <span class="nav-badge" id="navBadgeMatch"></span>
    </button>
  </div>
</nav>

<script>
  const LEVELS = ['A', 'B', 'C', 'D', 'E', '왕초심'];
  const LEVEL_CFG = {
    'A':    { bg: '#fee2e2', color: '#ef4444' },
    'B':    { bg: '#ffedd5', color: '#f97316' },
    'C':    { bg: '#dcfce7', color: '#22c55e' },
    'D':    { bg: '#dbeafe', color: '#3b82f6' },
    'E':    { bg: '#f3e8ff', color: '#a855f7' },
    '왕초심': { bg: '#f1f5f9', color: '#64748b' },
  };

  let players = [];
  let nextId = 1;
  let selectedGender = '남';
  let selectedLevel = 'A';
  let settings = { courtCount: 2, hasLessonCourt: false };

  const levelVal = l => LEVELS.indexOf(l);
  const avgLevel = (p1, p2) => (levelVal(p1.level) + levelVal(p2.level)) / 2;
  const isMobile = () => window.innerWidth <= 640;

  /* ── Storage ── */
  function saveToStorage() {
    try { localStorage.setItem('badminton-v2', JSON.stringify({ players, nextId, settings })); } catch(e) {}
  }

  function loadFromStorage() {
    try {
      const raw = localStorage.getItem('badminton-v2');
      if (!raw) return;
      const d = JSON.parse(raw);
      if (d.players)  players  = d.players;
      if (d.nextId)   nextId   = d.nextId;
      if (d.settings) Object.assign(settings, d.settings);
    } catch(e) {}
  }

  function exportData() {
    const blob = new Blob([JSON.stringify({ players, nextId, settings, exportedAt: new Date().toISOString() }, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `배드민턴_${new Date().toLocaleDateString('ko-KR').replace(/[\s.]/g,'')}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.players)  players  = d.players;
        if (d.nextId)   nextId   = d.nextId;
        if (d.settings) Object.assign(settings, d.settings);
        saveToStorage();
        renderAll();
      } catch { alert('파일을 읽을 수 없습니다.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  /* ── UI helpers ── */
  function switchMobileView(view) {
    document.getElementById('section-register').classList.toggle('active', view === 'register');
    document.getElementById('section-schedule').classList.toggle('active', view === 'schedule');
    document.getElementById('navRegister').classList.toggle('active', view === 'register');
    document.getElementById('navSchedule').classList.toggle('active', view === 'schedule');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function selectGender(g) {
    selectedGender = g;
    document.querySelectorAll('.gender-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.gender === g));
  }

  function selectLevel(l) {
    selectedLevel = l;
    document.querySelectorAll('.level-btn').forEach(b => {
      const cfg = LEVEL_CFG[b.dataset.level];
      if (b.dataset.level === l) {
        b.style.borderColor = cfg.color;
        b.style.background  = cfg.bg;
        b.style.color       = cfg.color;
      } else {
        b.style.borderColor = 'var(--border)';
        b.style.background  = '#fafbfc';
        b.style.color       = 'var(--text)';
      }
    });
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-content').forEach(c =>
      c.classList.toggle('active', c.id === 'tab-' + tab));
  }

  function selectCourtCount(n) {
    settings.courtCount = n;
    document.querySelectorAll('.court-btn').forEach(b =>
      b.classList.toggle('active', parseInt(b.dataset.count) === n));
    saveToStorage();
  }

  function toggleLessonCourt() {
    settings.hasLessonCourt = !settings.hasLessonCourt;
    const btn = document.getElementById('lessonToggle');
    btn.classList.toggle('on', settings.hasLessonCourt);
    btn.textContent = settings.hasLessonCourt ? 'ON' : 'OFF';
    saveToStorage();
  }

  function initCourtUI() {
    document.querySelectorAll('.court-btn').forEach(b =>
      b.classList.toggle('active', parseInt(b.dataset.count) === settings.courtCount));
    const btn = document.getElementById('lessonToggle');
    btn.classList.toggle('on', settings.hasLessonCourt);
    btn.textContent = settings.hasLessonCourt ? 'ON' : 'OFF';
  }

  /* ── Badge renderers ── */
  function levelBadge(level) {
    const cfg = LEVEL_CFG[level];
    const long = level.length > 1;
    return `<span class="level-badge" style="background:${cfg.bg};color:${cfg.color};${long ? 'width:auto;padding:0 6px;font-size:0.72rem;' : ''}">${level}</span>`;
  }

  function levelBadgeSmall(level) {
    const cfg = LEVEL_CFG[level];
    const long = level.length > 1;
    return `<span style="display:inline-flex;align-items:center;justify-content:center;background:${cfg.bg};color:${cfg.color};border-radius:4px;font-weight:700;flex-shrink:0;${long ? 'width:auto;padding:0 3px;font-size:0.58rem;height:20px;' : 'width:20px;height:20px;font-size:0.65rem;'}">${level}</span>`;
  }

  function initials(name) { return name.slice(0, 2); }

  /* ── Player management ── */
  function addPlayer() {
    const inp  = document.getElementById('inputName');
    const name = inp.value.trim();
    if (!name) {
      inp.classList.add('shake');
      inp.focus();
      setTimeout(() => inp.classList.remove('shake'), 300);
      return;
    }
    players.push({ id: nextId++, name, gender: selectedGender, level: selectedLevel });
    inp.value = '';
    inp.focus();
    saveToStorage();
    renderAll();
  }

  document.getElementById('inputName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPlayer();
  });

  function removePlayer(id) {
    players = players.filter(p => p.id !== id);
    saveToStorage();
    renderAll();
  }

  function renderAll() {
    renderPlayerList();
    updateStats();
  }

  function renderPlayerList() {
    const list   = document.getElementById('playerList');
    const header = document.getElementById('playerListHeader');
    const btn    = document.getElementById('btnGenerate');
    const badge  = document.getElementById('navBadgeCount');

    header.innerHTML = `📋 참가 선수 <span style="font-weight:400;color:var(--text-muted);font-size:.85rem;">(${players.length}명)</span>`;
    btn.disabled = players.length < 4;
    badge.textContent = players.length > 0 ? players.length : '';

    if (players.length === 0) {
      list.innerHTML = `<div class="empty-list"><div class="icon">🏸</div>선수를 등록해주세요</div>`;
      return;
    }

    const sorted = [...players].sort((a, b) => {
      if (a.gender !== b.gender) return a.gender === '남' ? -1 : 1;
      return levelVal(a.level) - levelVal(b.level);
    });

    list.innerHTML = sorted.map(p => `
      <div class="player-item">
        <div class="player-avatar ${p.gender === '남' ? 'avatar-male' : 'avatar-female'}">${initials(p.name)}</div>
        <div class="player-info">
          <div class="player-name">${p.name}</div>
          <div class="player-meta">${p.gender === '남' ? '남' : '여'} · ${p.level}급</div>
        </div>
        ${levelBadge(p.level)}
        <button class="btn btn-danger" onclick="removePlayer(${p.id})">삭제</button>
      </div>
    `).join('');
  }

  function updateStats() {
    const m = players.filter(p => p.gender === '남').length;
    const f = players.filter(p => p.gender === '여').length;
    document.getElementById('headerStats').innerHTML = `
      <span class="stat-chip">전체 ${players.length}명</span>
      <span class="stat-chip">남 ${m}명</span>
      <span class="stat-chip">여 ${f}명</span>
    `;
  }

  /* ── Match generation ── */
  function formSamePairs(list) {
    const sorted = [...list].sort((a, b) => levelVal(a.level) - levelVal(b.level));
    const pairs = [], used = new Set();
    for (let i = 0; i < sorted.length; i++) {
      if (used.has(sorted[i].id)) continue;
      for (let j = i + 1; j < sorted.length; j++) {
        if (used.has(sorted[j].id)) continue;
        pairs.push([sorted[i], sorted[j]]);
        used.add(sorted[i].id); used.add(sorted[j].id);
        break;
      }
    }
    return pairs;
  }

  function formMixedPairs(males, females) {
    const sm = [...males].sort((a, b) => levelVal(a.level) - levelVal(b.level));
    const sf = [...females].sort((a, b) => levelVal(a.level) - levelVal(b.level));
    const pairs = [];
    for (let i = 0; i < Math.min(sm.length, sf.length); i++) {
      pairs.push([sm[i], sf[i]]);
    }
    return pairs;
  }

  function formMatches(pairs, maxDiff = 2) {
    const matches = [];
    for (let i = 0; i < pairs.length; i++) {
      for (let j = i + 1; j < pairs.length; j++) {
        if (Math.abs(avgLevel(pairs[i][0], pairs[i][1]) - avgLevel(pairs[j][0], pairs[j][1])) <= maxDiff) {
          matches.push({ team1: pairs[i], team2: pairs[j] });
        }
      }
    }
    return matches;
  }

  function buildRounds(allMatches, courtCount) {
    const getIds = m => [m.team1[0].id, m.team1[1].id, m.team2[0].id, m.team2[1].id];
    const pool = [...allMatches];
    const rounds = [];
    let ri = 0;

    while (pool.length > 0) {
      const round = [];
      const used  = new Set();
      let cn = 1;

      for (let i = pool.length - 1; i >= 0; i--) {
        if (cn > courtCount) break;
        const m   = pool[i];
        const ids = getIds(m);
        if (ids.every(id => !used.has(id))) {
          round.push({ ...m, court: cn++, roundIdx: ri });
          ids.forEach(id => used.add(id));
          pool.splice(i, 1);
        }
      }

      if (round.length === 0) break;
      rounds.push(round);
      ri++;
    }
    return rounds;
  }

  function generateMatches() {
    const males   = players.filter(p => p.gender === '남');
    const females = players.filter(p => p.gender === '여');

    const menM   = formMatches(formSamePairs(males)).map(m => ({ ...m, type: 'men' }));
    const womenM = formMatches(formSamePairs(females)).map(m => ({ ...m, type: 'women' }));
    const mixedM = formMatches(formMixedPairs(males, females)).map(m => ({ ...m, type: 'mixed' }));

    const rounds = buildRounds([...menM, ...womenM, ...mixedM], settings.courtCount);
    const flat   = rounds.flat();

    const cnt = {
      men:   flat.filter(m => m.type === 'men').length,
      women: flat.filter(m => m.type === 'women').length,
      mixed: flat.filter(m => m.type === 'mixed').length,
    };
    const total = cnt.men + cnt.women + cnt.mixed;

    document.getElementById('countAll').textContent   = total;
    document.getElementById('countMen').textContent   = cnt.men;
    document.getElementById('countWomen').textContent = cnt.women;
    document.getElementById('countMixed').textContent = cnt.mixed;
    document.getElementById('navBadgeMatch').textContent = total > 0 ? total : '';

    document.getElementById('tab-all').innerHTML   = renderAllTab(rounds, cnt, males, females);
    document.getElementById('tab-men').innerHTML   = renderTypeTab(rounds, 'men',   males.length);
    document.getElementById('tab-women').innerHTML = renderTypeTab(rounds, 'women', females.length);
    document.getElementById('tab-mixed').innerHTML = renderTypeTab(rounds, 'mixed', 0, males.length, females.length);

    switchTab('all');
    if (isMobile()) switchMobileView('schedule');
  }

  /* ── Rendering ── */
  function playerTag(p, align = 'left') {
    const dot   = `<span class="player-dot ${p.gender === '남' ? 'dot-male' : 'dot-female'}"></span>`;
    const badge = levelBadgeSmall(p.level);
    const name  = `<span>${p.name}</span>`;
    return `<div class="player-tag">${align === 'right' ? badge + dot + name : dot + name + badge}</div>`;
  }

  function matchCard(m) {
    const t = m.team1, o = m.team2;
    const lvl1 = LEVELS[Math.min(LEVELS.length - 1, Math.round(avgLevel(t[0], t[1])))];
    const lvl2 = LEVELS[Math.min(LEVELS.length - 1, Math.round(avgLevel(o[0], o[1])))];
    const label     = m.type === 'men' ? '남복' : m.type === 'women' ? '여복' : '혼복';
    const courtText = `코트 ${m.court}`;
    const courtCls  = 'court-chip';
    return `
      <div class="match-card">
        <div class="match-header match-header-${m.type}">
          <span>${label}<span class="${courtCls}">${courtText}</span></span>
          <span>평균: ${lvl1} vs ${lvl2}</span>
        </div>
        <div class="match-body">
          <div class="team">${playerTag(t[0])}${playerTag(t[1])}</div>
          <div class="vs-badge">VS</div>
          <div class="team right">${playerTag(o[0],'right')}${playerTag(o[1],'right')}</div>
        </div>
      </div>`;
  }

  function renderRoundBlocks(rounds) {
    return rounds.map((round, i) => `
      <div class="round-header">
        <span class="round-badge">${i + 1}라운드</span>
        <div class="round-line"></div>
        <span style="font-size:.75rem;color:var(--text-muted);">${round.length}경기</span>
      </div>
      <div class="matches-grid">${round.map(m => matchCard(m)).join('')}</div>
    `).join('');
  }

  function renderAllTab(rounds, cnt, males, females) {
    const total = cnt.men + cnt.women + cnt.mixed;
    if (total === 0) {
      return `<div class="no-matches"><div class="big-icon">📋</div>선수를 등록하고<br>게임 편성을 생성해주세요</div>`;
    }

    let warn = '';
    if (males.length < 4)                             warn += `<div class="alert alert-warning">남자 선수 ${males.length}명 — 남복은 4명 이상 필요합니다.</div>`;
    if (females.length < 4)                           warn += `<div class="alert alert-warning">여자 선수 ${females.length}명 — 여복은 4명 이상 필요합니다.</div>`;
    if (males.length < 2 || females.length < 2)       warn += `<div class="alert alert-warning">혼복은 남·여 각 2명 이상 필요합니다.</div>`;

    const summary = `
      <div class="summary-grid">
        <div class="summary-box summary-box-men"><div class="summary-num summary-num-men">${cnt.men}</div><div class="summary-label">남복 경기</div></div>
        <div class="summary-box summary-box-women"><div class="summary-num summary-num-women">${cnt.women}</div><div class="summary-label">여복 경기</div></div>
        <div class="summary-box summary-box-mixed"><div class="summary-num summary-num-mixed">${cnt.mixed}</div><div class="summary-label">혼복 경기</div></div>
      </div>`;

    const actions = `
      <div class="action-bar">
        <button class="btn btn-secondary" onclick="generateMatches()">🔄 재편성</button>
        <button class="btn btn-secondary" onclick="window.print()">🖨️ 인쇄</button>
      </div>`;

    const lessonNotice = settings.hasLessonCourt
      ? `<div style="background:#f3e8ff;border:1.5px solid #d8b4fe;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:0.84rem;color:#7c3aed;font-weight:500;">🎯 레슨코트 별도 운영 중 — 일반 코트 ${settings.courtCount}개로만 경기 편성됩니다</div>`
      : '';

    return warn + lessonNotice + summary + actions + '<div class="scrollable">' + renderRoundBlocks(rounds) + '</div>';
  }

  function renderTypeTab(rounds, type, countA = 0, maleCount = 0, femaleCount = 0) {
    const matches = rounds.flat().filter(m => m.type === type);
    if (matches.length === 0) {
      let hint = '';
      if (type === 'men'   && countA < 4)                         hint = `남자 선수가 최소 4명 필요합니다 (현재 ${countA}명)`;
      if (type === 'women' && countA < 4)                         hint = `여자 선수가 최소 4명 필요합니다 (현재 ${countA}명)`;
      if (type === 'mixed' && (maleCount < 2 || femaleCount < 2)) hint = `혼복은 남·여 각 2명 이상 필요합니다 (남 ${maleCount}명, 여 ${femaleCount}명)`;
      const icon = type === 'men' ? '🔵' : type === 'women' ? '🔴' : '🟣';
      return `<div class="no-matches"><div class="big-icon">${icon}</div>${hint || '경기 없음'}</div>`;
    }

    const byRound = new Map();
    matches.forEach(m => {
      if (!byRound.has(m.roundIdx)) byRound.set(m.roundIdx, []);
      byRound.get(m.roundIdx).push(m);
    });

    let html = '', d = 1;
    [...byRound.entries()].sort((a, b) => a[0] - b[0]).forEach(([, ms]) => {
      html += `
        <div class="round-header">
          <span class="round-badge">${d++}라운드</span>
          <div class="round-line"></div>
          <span style="font-size:.75rem;color:var(--text-muted);">${ms.length}경기</span>
        </div>
        <div class="matches-grid">${ms.map(m => matchCard(m)).join('')}</div>`;
    });
    return html;
  }

  /* ── Init ── */
  loadFromStorage();
  renderAll();
  initCourtUI();
  selectLevel(selectedLevel);
</script>
</body>
</html>

name: Build Windows EXE

on:
  push:
    branches: ["claude/add-korean-language-pTR3W", "main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: |
          pip install PyQt5 pandas openpyxl xlsxwriter pyinstaller

      - name: EXE 빌드
        working-directory: erp_alps_checker
        run: |
          pyinstaller --onefile --windowed --name ERP_Alps_Check --add-data "logic.py;." gui.py

      - name: EXE 업로드 (다운로드 가능)
        uses: actions/upload-artifact@v4
        with:
          name: ERP_Alps_Check
          path: erp_alps_checker/dist/ERP_Alps_Check.exe
          retention-days: 30

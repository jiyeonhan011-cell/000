name: Build Windows EXE

on:
  push:
    branches: ["claude/add-korean-language-pTR3W", "main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install PyQt5 pandas openpyxl xlsxwriter pyinstaller

      - name: EXE 빌드
        working-directory: erp_alps_checker
        run: pyinstaller --onefile --windowed --name ERP_Alps_Check --add-data "logic.py;." gui.py

      - name: Release 생성 및 EXE 업로드
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: "ERP_Alps_Check 최신 빌드"
          body: "ERP ↔ Alps 출고수량 검증 프로그램"
          files: erp_alps_checker/dist/ERP_Alps_Check.exe
          make_latest: true
